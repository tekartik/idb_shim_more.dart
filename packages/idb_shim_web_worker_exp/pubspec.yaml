name: idb_shim_web_worker_exp
description: An absolute bare-bones web app.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  web: '>=1.0.0'
  idb_shim: '>=2.9.1-1'
  tekartik_js_utils_interop:
    git:
      url: https://github.com/tekartik/js_utils.dart
      path: js_utils_interop
    version: '>=0.1.0'
dev_dependencies:
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
    version: '>=0.1.0'
  build_runner: ">=2.15.0"
  build_web_compilers: ">=4.4.19"
  lints: ">=6.1.0"
  process_run: ">=1.2.1+1"
  tekartik_app_web_build:
    git:
      url: https://github.com/tekartik/app_web_utils.dart
      path: packages/app_build
    version: '>=0.0.1'
resolution: workspace
